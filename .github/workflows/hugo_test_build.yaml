name: Test Hugo Build

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.160.1

    steps:
    - name: Install Hugo CLI
      run: |
        wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
        && sudo dpkg -i ${{ runner.temp }}/hugo.deb
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Build site
      run: |
        hugo --gc --minify 2>&1 | tee build.log
        if grep -q "WARN deprecated" build.log; then
          echo "::error::Hugo emitted a deprecation warning — fix before merging."
          exit 1
        fi

    - name: Install htmltest
      env:
        HTMLTEST_VERSION: 0.17.0
      run: |
        curl -sL "https://github.com/wjdp/htmltest/releases/download/v${HTMLTEST_VERSION}/htmltest_${HTMLTEST_VERSION}_linux_amd64.tar.gz" | tar xz -C /usr/local/bin

    - name: Run link and HTML checks
      run: htmltest
