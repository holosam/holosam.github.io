<!DOCTYPE html>
<html lang="{{ default .Site.Language.Name .Site.Language.Locale }}">
<head>
  {{ partial "docs/html-head" . }}
  {{ partial "docs/inject/head" . }}
  {{- /* Fingerprinted like the game scripts, so CSS changes bust caches too. */ -}}
  {{- $css := resources.Get "css/games.css" | minify | fingerprint }}
  <link rel="stylesheet" href="{{ $css.RelPermalink }}" integrity="{{ $css.Data.Integrity }}">
</head>
<body class="game-body">
  <main class="game-main">
    {{ block "main" . }}{{ end }}
  </main>
</body>
</html>
