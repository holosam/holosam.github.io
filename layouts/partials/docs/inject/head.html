<!-- The default opengragh.html template is included in the theme but has unimplemented function in this theme, so manually insert this tag -->
{{ if .Params.image }}
  <meta property="og:image" content="{{ .Site.BaseURL }}{{ .Params.image }}">
{{ else }}
  <meta property="og:image" content="{{ .Site.BaseURL }}banner.png">
{{ end }}

<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

{{ if eq .Section "posts" }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": {{ .Title | jsonify }},
  "description": {{ .Description | jsonify }},
  "datePublished": {{ .Date.Format "2006-01-02T15:04:05-07:00" | jsonify }},
  "dateModified": {{ .Lastmod.Format "2006-01-02T15:04:05-07:00" | jsonify }},
  "author": {
    "@type": "Person",
    "name": "Sam Farid",
    "url": {{ .Site.BaseURL | jsonify }}
  },
  "publisher": {
    "@type": "Person",
    "name": "Sam Farid"
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": {{ .Permalink | jsonify }}
  }{{ with .Params.image }},
  "image": {{ printf "%s%s" $.Site.BaseURL . | jsonify }}{{ end }}
}
</script>
{{ end }}
